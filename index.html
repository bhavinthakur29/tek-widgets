<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Bhavin Thakur">
    <title>Teklok - Dynamic Showcase</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="style.css">
</head>

<body data-theme="aurora">
    <main class="site-shell" aria-label="Teklok app shell">
        <header class="shell-header">
            <div class="brand-block">
                <p class="shell-kicker">Teklok</p>
                <h1 class="shell-title">Premium Time Experiences</h1>
            </div>
            <nav class="shell-nav" aria-label="Page switcher">
                <button class="shell-nav-btn active" data-page="clock" type="button">Clock</button>
                <button class="shell-nav-btn" data-page="calendar" type="button">Calendar</button>
            </nav>
        </header>

        <section id="page-root" class="page-root" aria-live="polite"></section>
    </main>

    <script src="script.js"></script>
</body>

</html>
